<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Board Editor - Mega Robo Rally</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top bar ── */
        #topbar {
            background: #1a1a1a;
            border-bottom: 2px solid #444;
            padding: 6px 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        #topbar h2 {
            margin: 0;
            font-size: 16px;
            color: #ffcc00;
            white-space: nowrap;
        }
        #topbar select, #topbar input[type="text"], #topbar input[type="number"] {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 13px;
        }
        #topbar input[type="number"] { width: 56px; }
        #topbar label { font-size: 13px; color: #ccc; }
        .btn {
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { background: #555; }
        .btn-primary { background: #2a6; border-color: #3b7; }
        .btn-primary:hover { background: #3b7; }
        .btn-warn { background: #a62; border-color: #c74; }
        .btn-warn:hover { background: #c74; }
        #statusMsg {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 3px;
            background: #333;
            color: #aaa;
            min-width: 120px;
        }
        #statusMsg.dirty { background: #553; color: #ffcc00; }
        #statusMsg.saved { background: #253; color: #4f8; }
        #statusMsg.error { background: #522; color: #f88; }

        /* ── Main layout ── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Palette ── */
        #palette {
            width: 130px;
            min-width: 130px;
            background: #1c1c1c;
            border-right: 2px solid #444;
            overflow-y: auto;
            padding: 4px;
            flex-shrink: 0;
        }
        #palette h3 {
            margin: 4px 0 6px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            text-transform: uppercase;
        }
        .palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3px;
            cursor: pointer;
            border-radius: 3px;
            border: 2px solid transparent;
            margin-bottom: 2px;
        }
        .palette-item:hover { background: #333; }
        .palette-item.active { border-color: #ffcc00; background: #333; }
        .palette-item img {
            width: 40px;
            height: 40px;
            display: block;
        }
        .palette-item span {
            font-size: 9px;
            color: #bbb;
            text-align: center;
            margin-top: 2px;
            word-break: break-word;
            line-height: 1.1;
        }

        /* ── Grid area ── */
        #gridArea {
            flex: 1;
            overflow: auto;
            background: #282828;
            padding: 10px;
        }
        #boardGrid {
            display: inline-grid;
            background: #333;
            box-shadow: 0 0 20px #000a;
        }
        .cell {
            width: 56px;
            height: 56px;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            border: 1px solid #3a3a3a;
            background: #444;
            user-select: none;
        }
        .cell img {
            width: 56px;
            height: 56px;
            display: block;
            pointer-events: none;
        }
        .cell.selected {
            outline: 2px solid #0ff;
            outline-offset: -2px;
            z-index: 5;
        }
        .cell-label {
            position: absolute;
            top: 30%;
            right: 25%;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            text-shadow: 0 0 2px #000, 0 0 2px #000;
            z-index: 3;
        }
        .cell-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            pointer-events: none;
            z-index: 3;
        }

        /* ── Properties panel ── */
        #props {
            width: 260px;
            min-width: 260px;
            background: #1c1c1c;
            border-left: 2px solid #444;
            overflow-y: auto;
            padding: 8px;
            flex-shrink: 0;
        }
        #props h3 {
            margin: 0 0 8px;
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
        }
        .prop-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
        }
        .prop-label {
            font-size: 12px;
            color: #aaa;
            min-width: 70px;
        }
        .prop-value {
            font-size: 12px;
            color: #fff;
        }
        .prop-section {
            margin-top: 10px;
            padding-top: 6px;
            border-top: 1px solid #333;
        }
        .prop-section h4 {
            margin: 0 0 6px;
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }
        .dir-buttons {
            display: grid;
            grid-template-columns: repeat(3, 28px);
            grid-template-rows: repeat(3, 28px);
            gap: 2px;
        }
        .dir-btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .dir-btn:hover:not(.disabled) { background: #444; }
        .dir-btn.active { background: #0aa; border-color: #0cc; color: #fff; }
        .dir-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
        .dir-btn.spacer { visibility: hidden; }
        .check-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 12px;
        }
        .check-row input[type="checkbox"] { cursor: pointer; }
        .radio-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 12px;
        }
        .radio-row input[type="radio"] { cursor: pointer; }
        #props input[type="number"] {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 3px 5px;
            border-radius: 3px;
            width: 60px;
            font-size: 13px;
        }
        .prop-img {
            width: 48px;
            height: 48px;
            border: 1px solid #555;
            border-radius: 3px;
        }
        #btnApplyProps, #btnClearCell {
            width: 100%;
            margin-top: 6px;
        }
        #btnClearCell { background: #622; border-color: #844; }
        #btnClearCell:hover { background: #844; }
        #noSelection {
            color: #555;
            font-size: 13px;
            text-align: center;
            margin-top: 30px;
        }
        .collapse-section { margin-bottom: 4px; }
        .collapse-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; padding: 5px 6px; background: #252525;
            border: 1px solid #444; border-radius: 3px; user-select: none;
            font-size: 12px; color: #aaa; text-transform: uppercase; font-weight: bold;
        }
        .collapse-header:hover { background: #2e2e2e; }
        .collapse-body { padding: 6px 2px; }
        .collapse-body.hidden { display: none; }
        .param-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 12px; color: #ccc; flex-wrap: wrap; }
        .param-row label { color: #aaa; font-size: 11px; }
        .param-row input { background: #333; color: #fff; border: 1px solid #555; padding: 3px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div id="topbar">
    <h2>Board Editor</h2>
    <label>Board:</label>
    <select id="boardSelect" onchange="onBoardSelectChange()">
        <option value="">-- select --</option>
    </select>
    <span id="statusMsg">Ready</span>
</div>

<div id="main">
    <div id="palette">
        <h3>Palette</h3>
        <div id="paletteItems"></div>
    </div>
    <div id="gridArea">
        <div id="boardGrid"></div>
    </div>
    <div id="props">
        <div class="collapse-section">
            <div class="collapse-header" onclick="toggleSection('boardSettings')">
                <span>Board Settings</span><span id="arrow-boardSettings">▼</span>
            </div>
            <div id="boardSettings" class="collapse-body">
                <div class="param-row"><label>Name</label><input type="text" id="boardName" value="New Board" style="width:100%"></div>
                <div class="param-row"><label>W</label><input type="number" id="boardW" value="12" min="1" max="40" style="width:52px"> <label>H</label><input type="number" id="boardH" value="12" min="1" max="40" style="width:52px"></div>
                <div class="param-row"><label>LaserDmg</label><input type="number" id="laserDamage" value="1" min="0" max="10" style="width:52px"> <label>Phases</label><input type="number" id="phaseCount" value="5" min="1" max="5" style="width:52px"></div>
                <button class="btn" style="width:100%;margin-top:4px" onclick="applySizeChange()">Apply Size</button>
                <div style="display:flex;gap:4px;margin-top:4px">
                    <button class="btn" style="flex:1" onclick="newBoard()">New Board</button>
                    <button class="btn btn-primary" style="flex:1" onclick="saveBoard()">Save Board</button>
                </div>
            </div>
        </div>
        <div class="collapse-section">
            <div class="collapse-header" onclick="toggleSection('propsPanel')">
                <span>Properties</span><span id="arrow-propsPanel">▼</span>
            </div>
            <div id="propsPanel" class="collapse-body">
                <div id="propsContent"><div id="noSelection">Click a cell to select it, or choose a tile from the palette.</div></div>
            </div>
        </div>
        <div class="collapse-section">
            <div class="collapse-header" onclick="toggleSection('actionsPanel')">
                <span>Actions</span><span id="arrow-actionsPanel">▼</span>
            </div>
            <div id="actionsPanel" class="collapse-body">
                <div id="actionsContent"><div id="noActionsSelection" style="color:#555;font-size:13px;text-align:center;margin-top:10px">Select a cell to view its actions.</div></div>
            </div>
        </div>
        <div class="collapse-section">
            <div class="collapse-header" onclick="toggleSection('gameDataPanel')">
                <span>Game Data</span><span id="arrow-gameDataPanel">▼</span>
            </div>
            <div id="gameDataPanel" class="collapse-body">
                <div class="param-row">
                    <label style="white-space:nowrap">Game Data:</label>
                    <select id="gameDataSelect" onchange="onGameDataSelectChange()" style="flex:1;background:#333;color:#fff;border:1px solid #555;padding:3px 4px;border-radius:3px;font-size:12px">
                        <option value="">-- select --</option>
                    </select>
                </div>
                <div id="gameDataDetails"></div>
                <button class="btn btn-primary" id="btnApplyGameData" onclick="applyBoardToGameData()" style="width:100%;margin-top:6px" disabled>Apply Board to Game Data</button>
            </div>
        </div>
    </div>
</div>

<script>
// ── Collapsible panels ─────────────────────────────────────────────────────
function toggleSection(id) {
    const body = document.getElementById(id);
    const arrow = document.getElementById('arrow-' + id);
    const hidden = body.classList.toggle('hidden');
    arrow.textContent = hidden ? '►' : '▼';
}

// ── Constants ──────────────────────────────────────────────────────────────
const SA = { Move:12, Rotate:13, Damage:14, Archive:15, Flag:16, Option:17, BlockDirection:18, PlayerStart:19, FireCannon:60 };
const DIR = { None:0, Up:1, Right:2, Down:3, Left:4 };
const DIR_NAMES = ['None','Up','Right','Down','Left'];
const SA_NAMES = {12:'Move', 13:'Rotate', 14:'Damage', 15:'Archive', 16:'Flag', 17:'Option', 18:'BlockDirection', 19:'PlayerStart', 60:'FireCannon'};
const SA_SORTED = Object.entries(SA_NAMES).sort((a,b) => parseInt(a[0])-parseInt(b[0]));

// ── State ──────────────────────────────────────────────────────────────────
let squareTypes = [];
let boards = [];
let currentBoard = null;
let grid = [];
let activeTypeId = null;
let selectedCell = null;
let paletteCell = null;
let isDirty = false;
let isDragging = false;
let didDragMove = false;
let justPlaced = false;
let editingActions = [];
let gameDataRows = [];
let selectedGameDataId = null;

// ── Phase helpers ──────────────────────────────────────────────────────────
function phaseToBitmask(phases) { return phases.reduce((m, p) => m | (1 << (p - 1)), 0); }
function bitmaskToPhases(mask) { return [1,2,3,4,5].filter(p => (mask & (1 << (p-1))) !== 0); }

// ── Rotation helpers ───────────────────────────────────────────────────────
function rotationToDeg(rotation) {
    if (rotation === 0) return 0;
    return ((rotation - 1) % 4) * 90;
}

// ── Actions panel ─────────────────────────────────────────────────────────
function renderActionsPanel() {
    const container = document.getElementById('actionsContent');
    if (!container) return;
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">`;
    html += `<span style="font-size:11px;color:#888">${editingActions.length} action(s)</span>`;
    html += `<button class="btn" onclick="addAction()" style="padding:2px 8px;font-size:11px">+ Add</button>`;
    html += `</div>`;
    html += `<div id="actionsTableContainer">${renderActionsTable()}</div>`;
    container.innerHTML = html;
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
    await Promise.all([loadTypes(), loadBoards(), loadGameData()]);
    buildGrid(parseInt(document.getElementById('boardW').value), parseInt(document.getElementById('boardH').value));
    renderGrid();
}

async function loadTypes() {
    try {
        const res = await fetch('/api/boardeditor/types');
        if (res.ok) squareTypes = await res.json();
    } catch(e) { console.error('Failed to load types', e); }
    buildPalette();
}

async function loadBoards() {
    try {
        const res = await fetch('/api/boardeditor/boards');
        if (res.ok) {
            const data = await res.json();
            boards = data.boards || [];
        }
    } catch(e) { console.error('Failed to load boards', e); }
    populateBoardDropdown();
}

function buildPalette() {
    const container = document.getElementById('paletteItems');
    container.innerHTML = '';
    for (const t of squareTypes) {
        const div = document.createElement('div');
        div.className = 'palette-item';
        div.dataset.typeId = t.typeId;
        div.title = t.name + ' (' + t.typeId + ')';
        div.onclick = () => selectPaletteType(t.typeId, t.defaultRotation);

        const img = document.createElement('img');
        img.src = `images/Element${t.typeId}.jpg`;
        img.onerror = () => { img.src = 'images/Element0.jpg'; };

        const span = document.createElement('span');
        span.textContent = t.name;

        div.appendChild(img);
        div.appendChild(span);
        container.appendChild(div);
    }
}

function populateBoardDropdown() {
    const sel = document.getElementById('boardSelect');
    sel.innerHTML = '<option value="">-- select --</option>';
    for (const b of boards) {
        const opt = document.createElement('option');
        opt.value = b.BoardID;
        opt.textContent = `${b.BoardID}: ${b.BoardName} (${b.X}x${b.Y})`;
        sel.appendChild(opt);
    }
}

// ── Load board ─────────────────────────────────────────────────────────────
async function loadBoard(boardId) {
    try {
        const res = await fetch(`/api/boardeditor/${boardId}`);
        if (!res.ok) { showStatus('Failed to load board', 'error'); return; }
        const data = await res.json();
        currentBoard = {
            boardId: data.boardId,
            boardName: data.boardName,
            x: data.x,
            y: data.y,
            laserDamage: data.laserDamage,
            phaseCount: data.phaseCount,
            gameType: data.gameType,
            rulesVersion: data.rulesVersion
        };
        document.getElementById('boardName').value = data.boardName;
        document.getElementById('boardW').value = data.x;
        document.getElementById('boardH').value = data.y;
        document.getElementById('laserDamage').value = data.laserDamage;
        document.getElementById('phaseCount').value = data.phaseCount;

        buildGrid(data.x, data.y);
        overlayBoardData(data.items, data.actions);
        renderGrid();
        selectedCell = null;
        paletteCell = null;
        activeTypeId = null;
        document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
        document.getElementById('boardGrid').style.cursor = 'default';
        showNoSelection();
        isDirty = false;
        renderGameDataDetails();  // re-enable Apply Board button if a GameData row is selected
        showStatus('Loaded', 'saved');
    } catch(e) {
        showStatus('Error loading board', 'error');
        console.error(e);
    }
}

function onBoardSelectChange() {
    const sel = document.getElementById('boardSelect');
    if (!sel.value) return;
    if (isDirty && !confirm('You have unsaved changes. Load a different board and lose them?')) {
        // revert selection
        sel.value = currentBoard ? currentBoard.boardId : '';
        return;
    }
    loadBoard(parseInt(sel.value));
}

// ── Grid management ────────────────────────────────────────────────────────
function buildGrid(w, h) {
    grid = [];
    for (let y = 0; y < h; y++) {
        grid[y] = [];
        for (let x = 0; x < w; x++) {
            grid[y][x] = { squareType: 0, rotation: 0, actions: [] };
        }
    }
}

function overlayBoardData(items, actions) {
    const h = grid.length;
    const w = h > 0 ? grid[0].length : 0;

    // Group actions by x,y
    const actMap = {};
    for (const a of (actions || [])) {
        const key = `${a.x},${a.y}`;
        if (!actMap[key]) actMap[key] = [];
        actMap[key].push({ squareAction: a.squareAction, sequence: a.sequence, phase: a.phase, parameter: a.parameter });
    }

    for (const item of (items || [])) {
        if (item.y < h && item.x < w) {
            const key = `${item.x},${item.y}`;
            grid[item.y][item.x] = {
                squareType: item.squareType,
                rotation: item.rotation,
                actions: actMap[key] || []
            };
        }
    }
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderGrid() {
    const h = grid.length;
    const w = h > 0 ? grid[0].length : 0;
    const container = document.getElementById('boardGrid');
    container.style.gridTemplateColumns = `repeat(${w}, 56px)`;
    container.style.gridTemplateRows = `repeat(${h}, 56px)`;
    container.innerHTML = '';

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.id = `cell-${x}-${y}`;
            div.title = `(${x}, ${y})`;

            div.addEventListener('mousedown', e => onCellDown(e, x, y));
            div.addEventListener('mouseenter', () => onCellEnter(x, y));
            div.addEventListener('mouseup', e => onCellUp(e, x, y));

            fillCell(div, x, y);
            container.appendChild(div);
        }
    }

    // Global mouseup to end drag
    document.onmouseup = () => { isDragging = false; };
}

function renderCell(x, y) {
    const div = document.getElementById(`cell-${x}-${y}`);
    if (!div) return;
    fillCell(div, x, y);
    if (selectedCell && selectedCell.x === x && selectedCell.y === y) {
        div.classList.add('selected');
    }
}

function fillCell(div, x, y) {
    const cell = grid[y][x];
    div.innerHTML = '';

    const img = document.createElement('img');
    img.src = `images/Element${cell.squareType}.jpg`;
    img.onerror = () => { img.src = 'images/Element0.jpg'; };
    const deg = rotationToDeg(cell.rotation);
    img.style.transform = `rotate(${deg}deg)`;
    div.appendChild(img);

    // Overlay label: flag number, start number
    for (const act of cell.actions) {
        if (act.squareAction === SA.Flag) {
            const lbl = document.createElement('div');
            lbl.className = 'cell-label';
            lbl.textContent = 'F' + act.parameter;
            div.appendChild(lbl);
        } else if (act.squareAction === SA.PlayerStart) {
            const lbl = document.createElement('div');
            lbl.className = 'cell-icon';
            lbl.textContent = 'S' + act.parameter;
            lbl.style.transform = `rotate(${deg}deg)`;
            div.appendChild(lbl);
        }
    }
}

// ── Interaction ────────────────────────────────────────────────────────────
function onCellDown(e, x, y) {
    if (e.button !== 0) return;
    e.preventDefault();
    isDragging = true;
    didDragMove = false;
    justPlaced = false;

    if (activeTypeId !== null) {
        const cell = grid[y][x];
        if (cell.squareType !== activeTypeId) {
            placeSquare(x, y);
            justPlaced = true;  // freshly placed — don't rotate on mouseup
        }
        // same type already: will rotate on mouseup
    }
}

function onCellEnter(x, y) {
    if (!isDragging) return;
    didDragMove = true;
    if (activeTypeId !== null) {
        placeSquare(x, y);  // always replace when dragging
    }
}

function onCellUp(e, x, y) {
    if (e.button !== 0) return;
    isDragging = false;

    if (activeTypeId === null && !didDragMove) {
        selectCell(x, y);
    } else if (activeTypeId !== null && !didDragMove) {
        // If the cell already had this type (not freshly placed), cycle its rotation
        const cell = grid[y][x];
        if (!justPlaced && cell.squareType === activeTypeId) {
            const typeInfo = squareTypes.find(t => t.typeId === activeTypeId);
            if (typeInfo && typeInfo.canRotate) {
                cycleRotation(x, y);
            }
        }
    }
    justPlaced = false;
}

function selectPaletteType(typeId, defaultRotation) {
    if (activeTypeId === typeId) {
        // Deselect
        activeTypeId = null;
        paletteCell = null;
        document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
        document.getElementById('boardGrid').style.cursor = 'default';
        showNoSelection();
        return;
    }
    activeTypeId = typeId;
    document.querySelectorAll('.palette-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.typeId) === typeId);
    });
    document.getElementById('boardGrid').style.cursor = 'crosshair';

    // Deselect any selected board cell
    if (selectedCell) {
        const prev = document.getElementById(`cell-${selectedCell.x}-${selectedCell.y}`);
        if (prev) prev.classList.remove('selected');
        selectedCell = null;
    }

    const typeInfo = squareTypes.find(t => t.typeId === typeId);
    if (typeInfo) {
        paletteCell = {
            squareType: typeId,
            rotation: defaultRotation !== undefined ? defaultRotation : typeInfo.defaultRotation,
            actions: typeInfo.actions.map(a => ({ ...a }))
        };
        showPropsForCell(paletteCell, null, null);
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        activeTypeId = null;
        paletteCell = null;
        document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
        document.getElementById('boardGrid').style.cursor = 'default';
        if (!selectedCell) showNoSelection();
    }
});

// ── Place square ───────────────────────────────────────────────────────────
function placeSquare(x, y) {
    const typeInfo = squareTypes.find(t => t.typeId === activeTypeId);
    if (!typeInfo) return;

    const cell = grid[y][x];
    cell.squareType = activeTypeId;
    const source = paletteCell || typeInfo;
    cell.rotation = source.rotation !== undefined ? source.rotation : typeInfo.defaultRotation;

    // Copy actions from paletteCell template or typeInfo defaults, auto-setting flag/start params
    cell.actions = (paletteCell ? paletteCell.actions : typeInfo.actions).map(a => {
        const copy = { ...a };
        if (a.squareAction === SA.Flag) copy.parameter = getNextFlagNumber();
        if (a.squareAction === SA.PlayerStart) copy.parameter = getNextStartNumber();
        return copy;
    });

    renderCell(x, y);
    setDirty();
}

function cycleRotation(x, y) {
    const cell = grid[y][x];
    // Rotation cycles: 1->2->3->4->1
    if (cell.rotation === 0) cell.rotation = 1;
    else cell.rotation = (cell.rotation % 4) + 1;
    renderCell(x, y);
    setDirty();
    // Persist new rotation into paletteCell so future placements use it
    if (paletteCell && paletteCell.squareType === cell.squareType) {
        paletteCell.rotation = cell.rotation;
    }
    selectedCell = { x, y };
    showProps(x, y);
}

function getNextFlagNumber() {
    let max = 0;
    const h = grid.length, w = h > 0 ? grid[0].length : 0;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
        for (const a of grid[y][x].actions) {
            if (a.squareAction === SA.Flag && a.parameter > max) max = a.parameter;
        }
    }
    return max + 1;
}

function getNextStartNumber() {
    let max = 0;
    const h = grid.length, w = h > 0 ? grid[0].length : 0;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
        for (const a of grid[y][x].actions) {
            if (a.squareAction === SA.PlayerStart && a.parameter > max) max = a.parameter;
        }
    }
    return max + 1;
}

// ── Select and show props ──────────────────────────────────────────────────
function selectCell(x, y) {
    // Deselect old
    if (selectedCell) {
        const old = document.getElementById(`cell-${selectedCell.x}-${selectedCell.y}`);
        if (old) old.classList.remove('selected');
    }
    selectedCell = { x, y };
    const div = document.getElementById(`cell-${x}-${y}`);
    if (div) div.classList.add('selected');
    showProps(x, y);
}

function showNoSelection() {
    document.getElementById('propsContent').innerHTML = '<div id="noSelection">Click a cell to select it, or choose a tile from the palette.</div>';
    const ac = document.getElementById('actionsContent');
    if (ac) ac.innerHTML = '<div id="noActionsSelection" style="color:#555;font-size:13px;text-align:center;margin-top:10px">Select a cell to view its actions.</div>';
}

function showProps(x, y) {
    showPropsForCell(grid[y][x], x, y);
}

function showPropsForCell(cell, x, y, keepEditingActions) {
    if (!keepEditingActions) {
        editingActions = (cell.actions || []).map(a => ({...a}));
    }
    const typeInfo = squareTypes.find(t => t.typeId === cell.squareType) || { name: 'Blank', typeId: 0, canRotate: false };
    const container = document.getElementById('propsContent');
    const isPaletteMode = (x === null && y === null);

    let html = '';

    // Header
    html += `<div class="prop-row">
        <img class="prop-img" id="propTypeImg" src="images/Element${cell.squareType}.jpg" onerror="this.src='images/Element0.jpg'" style="transform:rotate(${rotationToDeg(cell.rotation)}deg)">
        <div>
            <div class="prop-value" id="propTypeName" style="font-weight:bold">${typeInfo.name}</div>
            <div id="propTypeId" style="font-size:11px;color:#888">Type ID: ${cell.squareType}</div>
        </div>
    </div>`;

    // Position
    if (isPaletteMode) {
        html += `<div class="prop-row"><span class="prop-label">Position:</span><span class="prop-value">Template</span></div>`;
    } else {
        html += `<div class="prop-row"><span class="prop-label">Position:</span><span class="prop-value">(${x}, ${y})</span></div>`;
    }

    // Square Type selector
    html += `<div class="prop-section"><h4>Square Type</h4>`;
    html += `<select id="propSquareType" style="background:#333;color:#fff;border:1px solid #555;padding:3px 4px;border-radius:3px;width:100%;font-size:12px" onchange="onPropTypeChange()">`;
    for (const t of squareTypes) {
        html += `<option value="${t.typeId}"${t.typeId===cell.squareType?' selected':''}>${t.name} (${t.typeId})</option>`;
    }
    html += `</select></div>`;

    // Rotation
    const canRotate = typeInfo.canRotate !== false;
    const dis = canRotate ? '' : ' disabled';
    html += `<div class="prop-section"><h4>Rotation</h4>`;
    html += `<div class="dir-buttons">`;
    html += `<div class="dir-btn spacer"></div>`;
    html += `<div class="dir-btn${cell.rotation===1?' active':''}${dis}" onclick="setRotationOnActive(1)" title="Up (1)">↑</div>`;
    html += `<div class="dir-btn spacer"></div>`;
    html += `<div class="dir-btn${cell.rotation===4?' active':''}${dis}" onclick="setRotationOnActive(4)" title="Left (4)">←</div>`;
    html += `<div class="dir-btn${cell.rotation===0?' active':''}" onclick="setRotationOnActive(0)" title="None (0)">·</div>`;
    html += `<div class="dir-btn${cell.rotation===2?' active':''}${dis}" onclick="setRotationOnActive(2)" title="Right (2)">→</div>`;
    html += `<div class="dir-btn spacer"></div>`;
    html += `<div class="dir-btn${cell.rotation===3?' active':''}${dis}" onclick="setRotationOnActive(3)" title="Down (3)">↓</div>`;
    html += `<div class="dir-btn spacer"></div>`;
    html += `</div></div>`;

    // Apply / Clear buttons
    html += `<button class="btn btn-primary" id="btnApplyProps" onclick="applyProps()">Apply</button>`;
    if (!isPaletteMode) {
        html += `<button class="btn" id="btnClearCell" onclick="clearCell(${x},${y})">Clear Cell</button>`;
    }

    container.innerHTML = html;
    renderActionsPanel();
}

function setRotationOnActive(rot) {
    if (selectedCell) {
        setRotation(selectedCell.x, selectedCell.y, rot);
    } else if (paletteCell) {
        const typeInfo = squareTypes.find(t => t.typeId === paletteCell.squareType);
        if (rot !== 0 && typeInfo && typeInfo.canRotate === false) return;
        readAllActionRowValues();
        paletteCell.rotation = rot;
        showPropsForCell(paletteCell, null, null, true);
    }
}

function setRotation(x, y, rot) {
    const typeInfo = squareTypes.find(t => t.typeId === grid[y][x].squareType);
    if (rot !== 0 && typeInfo && typeInfo.canRotate === false) return;
    readAllActionRowValues();
    grid[y][x].rotation = rot;
    renderCell(x, y);
    setDirty();
    showPropsForCell(grid[y][x], x, y, true);
}

function clearCell(x, y) {
    grid[y][x] = { squareType: 0, rotation: 0, actions: [] };
    renderCell(x, y);
    setDirty();
    showProps(x, y);
}

function applyPropsToCell(cell) {
    readAllActionRowValues();

    // Square type
    const typeEl = document.getElementById('propSquareType');
    if (typeEl) cell.squareType = parseInt(typeEl.value);

    // Actions
    cell.actions = editingActions.map(a => ({...a}));
}

function renderActionsTable() {
    if (editingActions.length === 0) {
        return `<div style="color:#555;font-size:11px;text-align:center;padding:6px">No actions</div>`;
    }
    return editingActions.map((a, i) => renderActionRow(a, i)).join('');
}

function renderActionRow(a, idx) {
    const phases = bitmaskToPhases(a.phase || 0);
    let html = `<div style="background:#252525;border:1px solid #3a3a3a;border-radius:3px;padding:5px;margin-bottom:4px">`;

    // Row 1: action type select + delete button
    html += `<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center">`;
    html += `<select id="act_type_${idx}" style="flex:1;background:#333;color:#fff;border:1px solid #555;padding:2px 3px;border-radius:3px;font-size:11px">`;
    for (const [val, name] of SA_SORTED) {
        html += `<option value="${val}"${parseInt(val)===a.squareAction?' selected':''}>${name} (${val})</option>`;
    }
    html += `</select>`;
    html += `<button onclick="deleteAction(${idx})" style="background:#622;border:1px solid #844;color:#f88;border-radius:3px;padding:0 7px;cursor:pointer;font-size:14px;line-height:22px" title="Delete action">×</button>`;
    html += `</div>`;

    // Row 2: sequence + parameter
    html += `<div style="display:flex;gap:6px;margin-bottom:4px">`;
    html += `<div style="flex:1"><div style="font-size:10px;color:#888;margin-bottom:2px">Sequence</div>`;
    html += `<input type="number" id="act_seq_${idx}" value="${a.sequence || 0}" min="0" style="width:100%;background:#333;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:3px;font-size:11px"></div>`;
    html += `<div style="flex:1"><div style="font-size:10px;color:#888;margin-bottom:2px">Parameter</div>`;
    html += `<input type="number" id="act_param_${idx}" value="${a.parameter || 0}" style="width:100%;background:#333;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:3px;font-size:11px"></div>`;
    html += `</div>`;

    // Row 3: phase bitmask toggles (phases 1–5)
    html += `<div style="display:flex;align-items:center;gap:3px">`;
    html += `<span style="font-size:10px;color:#888;margin-right:2px">Phase:</span>`;
    for (let p = 1; p <= 5; p++) {
        const active = phases.includes(p);
        html += `<button onclick="togglePhase(${idx},${p})" style="background:${active?'#0aa':'#333'};border:1px solid ${active?'#0cc':'#555'};color:${active?'#fff':'#aaa'};padding:1px 5px;border-radius:3px;font-size:11px;cursor:pointer;min-width:22px">${p}</button>`;
    }
    html += `</div>`;

    html += `</div>`;
    return html;
}

function onPropTypeChange() {
    const sel = document.getElementById('propSquareType');
    if (!sel) return;
    const newTypeId = parseInt(sel.value);
    const typeInfo = squareTypes.find(t => t.typeId === newTypeId) || { name: 'Unknown', typeId: newTypeId };
    const img = document.getElementById('propTypeImg');
    if (img) { img.src = `images/Element${newTypeId}.jpg`; img.onerror = function(){ this.src='images/Element0.jpg'; }; }
    const nm = document.getElementById('propTypeName');
    if (nm) nm.textContent = typeInfo.name;
    const ti = document.getElementById('propTypeId');
    if (ti) ti.textContent = 'Type ID: ' + newTypeId;
}

function readAllActionRowValues() {
    for (let i = 0; i < editingActions.length; i++) {
        const typeEl = document.getElementById(`act_type_${i}`);
        const seqEl = document.getElementById(`act_seq_${i}`);
        const paramEl = document.getElementById(`act_param_${i}`);
        if (typeEl) editingActions[i].squareAction = parseInt(typeEl.value);
        if (seqEl) editingActions[i].sequence = parseInt(seqEl.value) || 0;
        if (paramEl) editingActions[i].parameter = parseInt(paramEl.value) || 0;
    }
}

function addAction() {
    readAllActionRowValues();
    editingActions.push({ squareAction: SA.Move, sequence: 0, phase: 31, parameter: 0 });
    refreshActionsSection();
}

function deleteAction(idx) {
    readAllActionRowValues();
    editingActions.splice(idx, 1);
    refreshActionsSection();
}

function togglePhase(idx, phase) {
    readAllActionRowValues();
    const a = editingActions[idx];
    const phases = bitmaskToPhases(a.phase || 0);
    if (phases.includes(phase)) {
        a.phase = phaseToBitmask(phases.filter(p => p !== phase));
    } else {
        a.phase = phaseToBitmask([...phases, phase]);
    }
    refreshActionsSection();
}

function refreshActionsSection() {
    const container = document.getElementById('actionsTableContainer');
    if (container) container.innerHTML = renderActionsTable();
}

function applyProps() {
    if (selectedCell) {
        const { x, y } = selectedCell;
        const cell = grid[y][x];
        applyPropsToCell(cell);
        renderCell(x, y);
        setDirty();
        showPropsForCell(cell, x, y, true);
    } else if (paletteCell) {
        applyPropsToCell(paletteCell);
        showPropsForCell(paletteCell, null, null, true);
    }
}

// ── Size change ────────────────────────────────────────────────────────────
function applySizeChange() {
    const newW = parseInt(document.getElementById('boardW').value);
    const newH = parseInt(document.getElementById('boardH').value);
    const oldH = grid.length;
    const oldW = oldH > 0 ? grid[0].length : 0;

    if ((newW < oldW || newH < oldH)) {
        if (!confirm(`This will remove cells outside the new bounds (${newW}x${newH}). Continue?`)) return;
    }

    const newGrid = [];
    for (let y = 0; y < newH; y++) {
        newGrid[y] = [];
        for (let x = 0; x < newW; x++) {
            if (y < oldH && x < oldW) {
                newGrid[y][x] = grid[y][x];
            } else {
                newGrid[y][x] = { squareType: 0, rotation: 0, actions: [] };
            }
        }
    }
    grid = newGrid;
    if (selectedCell && (selectedCell.x >= newW || selectedCell.y >= newH)) {
        selectedCell = null;
        showNoSelection();
    }
    renderGrid();
    setDirty();
}

// ── New board ──────────────────────────────────────────────────────────────
async function newBoard() {
    if (isDirty && !confirm('You have unsaved changes. Create a new board anyway?')) return;

    const payload = {
        boardName: document.getElementById('boardName').value || 'New Board',
        x: parseInt(document.getElementById('boardW').value),
        y: parseInt(document.getElementById('boardH').value),
        laserDamage: parseInt(document.getElementById('laserDamage').value),
        phaseCount: parseInt(document.getElementById('phaseCount').value),
        gameType: 0,
        rulesVersion: 1
    };

    try {
        const res = await fetch('/api/boardeditor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            const err = await res.json();
            showStatus('Error: ' + (err.error || 'create failed'), 'error');
            return;
        }
        const data = await res.json();
        showStatus('Created board ' + data.boardId, 'saved');
        // Reload board list and load new board
        await loadBoards();
        document.getElementById('boardSelect').value = data.boardId;
        await loadBoard(data.boardId);
    } catch(e) {
        showStatus('Network error', 'error');
        console.error(e);
    }
}

// ── Save board ─────────────────────────────────────────────────────────────
async function saveBoard() {
    if (!currentBoard) {
        showStatus('No board loaded. Use New Board first.', 'error');
        return;
    }

    const h = grid.length;
    const w = h > 0 ? grid[0].length : 0;
    const squares = [];
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const cell = grid[y][x];
            squares.push({
                x, y,
                squareType: cell.squareType,
                rotation: cell.rotation,
                actions: cell.actions
            });
        }
    }

    const payload = {
        boardName: document.getElementById('boardName').value || currentBoard.boardName,
        x: w,
        y: h,
        laserDamage: parseInt(document.getElementById('laserDamage').value),
        phaseCount: parseInt(document.getElementById('phaseCount').value),
        gameType: currentBoard.gameType || 0,
        rulesVersion: currentBoard.rulesVersion || 1,
        squares
    };

    try {
        const res = await fetch(`/api/boardeditor/${currentBoard.boardId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            const err = await res.json();
            showStatus('Error: ' + (err.error || 'save failed'), 'error');
            return;
        }
        const data = await res.json();
        isDirty = false;
        showStatus(`Saved! Flags: ${data.totalFlags}, Starts: ${data.totalPlayers}`, 'saved');
        currentBoard.boardName = payload.boardName;
        currentBoard.x = w;
        currentBoard.y = h;
        // Refresh board list name
        await loadBoards();
        document.getElementById('boardSelect').value = currentBoard.boardId;
    } catch(e) {
        showStatus('Network error', 'error');
        console.error(e);
    }
}

// ── Status ─────────────────────────────────────────────────────────────────
function setDirty() {
    isDirty = true;
    showStatus('Unsaved changes', 'dirty');
}

function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = type || '';
    if (type === 'saved') {
        setTimeout(() => {
            if (el.textContent === msg) { el.textContent = 'Ready'; el.className = ''; }
        }, 3000);
    }
}

// ── Game Data panel ────────────────────────────────────────────────────────
async function loadGameData() {
    try {
        const res = await fetch('/api/boardeditor/gamedata');
        if (res.ok) {
            const data = await res.json();
            gameDataRows = data.gameData || [];
        }
    } catch(e) { console.error('Failed to load game data', e); }
    populateGameDataDropdown();
}

function populateGameDataDropdown() {
    const sel = document.getElementById('gameDataSelect');
    if (!sel) return;
    const prev = selectedGameDataId;
    sel.innerHTML = '<option value="">-- select --</option>';
    for (const gd of gameDataRows) {
        const opt = document.createElement('option');
        opt.value = gd.GameDataID;
        const label = gd.Description || gd.GameCode || ('Game ' + gd.GameDataID);
        opt.textContent = `${gd.GameDataID}: ${label}`;
        sel.appendChild(opt);
    }
    if (prev) { sel.value = prev; }
}

function onGameDataSelectChange() {
    const sel = document.getElementById('gameDataSelect');
    selectedGameDataId = sel.value ? parseInt(sel.value) : null;
    renderGameDataDetails();
}

const GD_LABELS = {
    BoardID: 'Board ID', GameType: 'Game Type', TotalFlags: 'Total Flags',
    LaserDamage: 'Laser Damage', PhaseCount: 'Phase Count',
    BoardCols: 'Board Cols', BoardRows: 'Board Rows',
    RulesVersion: 'Rules Version', PlayerListID: 'Player List ID',
    OptionCount: 'Option Count'
};

function renderGameDataDetails() {
    const el = document.getElementById('gameDataDetails');
    const btn = document.getElementById('btnApplyGameData');
    if (!el) return;

    if (!selectedGameDataId) {
        el.innerHTML = '';
        if (btn) btn.disabled = true;
        return;
    }

    const gd = gameDataRows.find(g => g.GameDataID === selectedGameDataId);
    if (!gd) { el.innerHTML = ''; return; }

    const fields = ['BoardID','GameType','TotalFlags','LaserDamage','PhaseCount',
                    'BoardCols','BoardRows','RulesVersion','PlayerListID','OptionCount'];
    let rows = '';
    for (const f of fields) {
        rows += `<tr><td style="color:#888;padding:2px 4px;font-size:11px">${GD_LABELS[f]}</td>` +
                `<td style="color:#ccc;padding:2px 4px;font-size:11px;text-align:right">${gd[f] ?? ''}</td></tr>`;
    }
    el.innerHTML = `<div class="prop-section">
        <table style="width:100%;border-collapse:collapse">
            <tr><td colspan="2" style="color:#aaa;font-size:11px;padding:2px 4px;border-bottom:1px solid #333">
                ${gd.Description || gd.GameCode || ''}
            </td></tr>
            ${rows}
        </table>
    </div>`;

    if (btn) btn.disabled = !currentBoard;
}

async function applyBoardToGameData() {
    if (!currentBoard || !selectedGameDataId) return;
    const btn = document.getElementById('btnApplyGameData');
    if (btn) { btn.disabled = true; btn.textContent = 'Applying...'; }
    try {
        const res = await fetch(`/api/boardeditor/gamedata/${selectedGameDataId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ boardId: currentBoard.boardId })
        });
        if (!res.ok) {
            const err = await res.json();
            showStatus('GameData error: ' + (err.error || 'update failed'), 'error');
            return;
        }
        const data = await res.json();
        if (data.gameData && data.gameData.length > 0) {
            const idx = gameDataRows.findIndex(g => g.GameDataID === selectedGameDataId);
            if (idx >= 0) gameDataRows[idx] = data.gameData[0];
            else gameDataRows.push(data.gameData[0]);
        }
        renderGameDataDetails();
        showStatus('Game Data updated', 'saved');
    } catch(e) {
        showStatus('Network error', 'error');
        console.error(e);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Apply Board to Game Data'; }
    }
}

// ── Beforeunload warning ───────────────────────────────────────────────────
window.addEventListener('beforeunload', e => {
    if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
