
<html>
<head>
    <title>MEGA Robo Rally</title>
    <style>
        .frame-container { margin: 2px 0; }
        .frame-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            background: #ddd;
            padding: 2px 6px;
            font-family: sans-serif;
            font-size: 13px;
        }
        .frame-toggle:hover { background: #ccc; }
        .frame-toggle .arrow { font-size: 10px; transition: transform 0.15s; }
        .frame-toggle.collapsed .arrow { transform: rotate(-90deg); }
        .frame-body { overflow: hidden; }
        .frame-body.hidden { display: none; }
    </style>
</head>
<body style="margin:0; padding:4px;">

    <div class="frame-container">
        <div class="frame-toggle" onclick="toggle(this)">
            <span class="arrow">&#9660;</span> Menu
        </div>
        <div class="frame-body">
            <iframe src="gmindex.html" name="menu" height="300" style="border:none;"></iframe>
            <iframe src="" name="message" height="310" style="border:1px solid black; "></iframe>
            <iframe src="index.html" name="playerwindow" width="700" height="310" style="border:1px solid black; "></iframe>
        </div>
    </div>

    <div class="frame-container">
        <div class="frame-toggle" onclick="toggle(this)">
            <span class="arrow">&#9660;</span> DB Editor
        </div>
        <div class="frame-body">
            <iframe src="datagrid-editor.html" name="dbedit" width="100%" height="500" style="border:1px solid black; display:block;"></iframe>
        </div>
    </div>

    <div class="frame-container">
        <div class="frame-toggle" onclick="toggle(this)">
            <span class="arrow">&#9660;</span> Board Viewer
        </div>
        <div class="frame-body">
            <iframe src="board-viewer.html" name="boardview" width="100%" height="1000" style="border:1px solid black; display:block;"></iframe>
        </div>
    </div>

    <div class="frame-container">
        <div class="frame-toggle" onclick="toggle(this)">
            <span class="arrow">&#9660;</span> Board Editor
        </div>
        <div class="frame-body">
            <iframe src="board-editor.html" name="boardedit" width="100%" height="1000" style="border:1px solid black; display:block;"></iframe>
        </div>
    </div>

    <script>
        function toggle(header) {
            const body = header.nextElementSibling;
            const collapsed = body.classList.toggle('hidden');
            header.classList.toggle('collapsed', collapsed);
        }
    </script>
</body>
</html>
