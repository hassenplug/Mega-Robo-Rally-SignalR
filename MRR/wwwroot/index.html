<!DOCTYPE html>
<html>
<head>

<meta name='viewport' content='width=device-width, initial-scale=1'>
<link rel="stylesheet" type="text/css" href="style/checkbox.css">
<link rel="stylesheet" type="text/css" href="style/button.css">
<link rel="stylesheet" type="text/css" href="style/w3.css">

<meta name="theme-color" content="#aaffff">

<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<script src="js/signalr.min.js"></script>
<script src="js/jquery.min.js" type="text/javascript" charset="utf-8"></script>
<script src="js/loadrobots.js" type="text/javascript" charset="utf-8"></script>

<title>MEGA Robo Rally</title>

<style>
a:link {
    text-decoration: none;
    color: #000000;
}

a:visited {
    text-decoration: none;
    color: #000000;
}
</style>

</head>
<body id='body' style='padding:5px; padding-top:0px'>

<table id="playertable" bgcolor="ffffff" border=0 width=100%>
<tr bgcolor="#d0d0d0"><td>Robot</td>
<td align=center>Flags</td>
<td align=center>Status</td>
<td align=center width=40% id="title">---</td>
</tr>
<tr id="tr1" style="display: none">
    <td align=center><button class='button' id="button1" style='background-color:#e0e0e0; color:#000000' onclick='showplayerprogram(1);'>--</button></td>
    <td align=center id="flags1" bgcolor='#e0e0e0'>
        <table width="100%">
            <tr height="10">
                <td id='flag10' colspan="2" height="10" bgcolor='ffffff'> </td>
                <td id='flag11' colspan="2" height="10" bgcolor='ffffff'> </td>
                <td id='flag12' colspan="2" height="10" bgcolor='ffffff'> </td>
                <td id='flag13' colspan="2" height="10" bgcolor='ffffff'> </td>
                <td id='flag14' colspan="2" height="10" bgcolor='ffffff'> </td>
            </tr>
            <tr height="10">
                <td id='energy10' bgcolor='#ffffff'> </td>
                <td id='energy11' bgcolor='#ffffff'> </td>
                <td id='energy12' bgcolor='#ffffff'> </td>
                <td id='energy13' bgcolor='#ffffff'> </td>
                <td id='energy14' bgcolor='#ffffff'> </td>
                <td id='energy15' bgcolor='#ffffff'> </td>
                <td id='energy16' bgcolor='#ffffff'> </td>
                <td id='energy17' bgcolor='#ffffff'> </td>
                <td id='energy18' bgcolor='#ffffff'> </td>
                <td id='energy19' bgcolor='#ffffff'> </td>
            </tr>
        </table>
    </td>
    <td align=center id='playerstatus1'>--</td>
    <td align=center rowspan="8" bgcolor="#e0e0e0" id="showprogram">
        <table bgcolor="e0e0e0" width="100%">
            <tr id="messagetable" style="display: none;">
                <td colspan="5">
                    <button class='button' id="btnMessagebox" style='background-color:#ff0000; color:#ffffff' onclick='confirmMessage();'>
                        msg
                    </button>
                </td>
            </tr>
            <tr id="messagetablespace" style="display: none;"><td colspan="5"><br></td></tr>
            <tr bgcolor="#d0d0d0">
                <td align=center bgcolor=ffffff id='CardCell0'><img id='Played0' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff id='CardCell1'><img id='Played1' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff id='CardCell2'><img id='Played2' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff id='CardCell3'><img id='Played3' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff id='CardCell4'><img id='Played4' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
            </tr>
            <tr><td colspan="5"><br></td></tr>
            <tr>
                <td align=center bgcolor=ffffff><img id='Dealt0' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt1' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt2' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt3' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt4' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
            </tr>
            <tr>
                <td align=center bgcolor=ffffff><img id='Dealt5' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt6' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt7' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt8' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
                <td align=center bgcolor=ffffff><img id='Dealt9' src='images/type0.png' onclick='PlayCard(this);' width='50'/></td>
            </tr>
        </table>
    </td>
</tr>
</table>

<script>
(function () {
    const table = document.getElementById('playertable');
    for (let p = 2; p <= 8; p++) {
        let flagCells = '';
        for (let j = 0; j < 5; j++) {
            flagCells += `<td id='flag${p}${j}' colspan="2" height="10" bgcolor='ffffff'> </td>`;
        }
        let energyCells = '';
        for (let j = 0; j < 10; j++) {
            energyCells += `<td id='energy${p}${j}' bgcolor='#ffffff'> </td>`;
        }
        table.insertAdjacentHTML('beforeend', `<tr id="tr${p}" style="display: none">
    <td align=center><button class='button' id="button${p}" style='background-color:#e0e0e0; color:#000000' onclick='showplayerprogram(${p});'>--</button></td>
    <td align=center id="flags${p}" bgcolor='#e0e0e0'>
        <table width="100%">
            <tr height="10">${flagCells}</tr>
            <tr height="10">${energyCells}</tr>
        </table>
    </td>
    <td align=center id='playerstatus${p}'>--</td>
</tr>`);
    }
})();
</script>

</body>
</html>
